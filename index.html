<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 + Plane VR</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <img id="howls" src="Pictures/howls.png">
    <img id="cottage" src="Pictures/cottage.png">
    <img id="roof" src="Pictures/roof.png">

    <img id="btn1" src="Pictures/Button1.png">
    <img id="btn2" src="Pictures/Button2.png">
    <img id="btn3" src="Pictures/Button3.png">
    <img id="btn4" src="Pictures/Button4.png">
    <img id="btn5" src="Pictures/Button5.png">

    <a-asset-item id="planeModel" src="Pictures/plane.glb"></a-asset-item>
  </a-assets>

  <!-- SKY -->
  <a-sky id="sky" src="#howls"></a-sky>

  <a-sky id="planeSky" visible="false" color="#87CEEB"></a-sky>

  <!-- PLANE -->
  <a-entity id="plane"
            gltf-model="#planeModel"
            position="-6 -1 -6"
            scale="0.5 0.5 0.5"
            visible="false">
  </a-entity>

  <!-- UI BUTTONS -->
  <a-entity id="ui" position="-2 -1 -4">

    <a-box class="link" id="b1" position="0 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn1"></a-box>

    <a-box class="link" id="b2" position="1.5 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn2"></a-box>

    <a-box class="link" id="b3" position="3 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn3"></a-box>

    <a-box class="link" id="btn4" position="4.5 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn4"></a-box>

  </a-entity>

  <!-- CAMERA + YOUR ORIGINAL CURSOR -->
  <a-entity camera look-controls>

    <a-cursor
      id="cursor"
      animation__click="property: scale;
                        startEvents: click;
                        from: 0.1 0.1 0.1;
                        to: 1 1 1;
                        dur: 150"
      animation__fusing="property: fusing;
                         startEvents: fusing;
                         from: 1 1 1;
                         to: 0.1 1 1;
                         dur: 1500"
      event-set__mouseenter="_event: mouseenter; color: springgreen"
      event-set__mouseleave="_event: mouseleave; color: black"
      raycaster="objects: .link">
    </a-cursor>

    <!-- NEXT BUTTON (IN WORLD, NOT BLOCKING VIEW) -->
    <a-entity id="nextBtn"
              class="link"
              position="0 -0.5 -2"
              geometry="primitive: plane; height: 0.3; width: 0.6"
              material="src: #btn5"
              visible="false">
    </a-entity>

  </a-entity>

</a-scene>

<script>
window.addEventListener('DOMContentLoaded', () => {

  const sky = document.querySelector('#sky');
  const planeSky = document.querySelector('#planeSky');
  const plane = document.querySelector('#plane');
  const ui = document.querySelector('#ui');

  const btn4 = document.querySelector('#btn4');
  const nextBtn = document.querySelector('#nextBtn');

  let inPlaneMode = false;
  let step = 0;

  const steps = [
    { x: -6, y: 1.6, z: -4 },
    { x: -5, y: 1.6, z: -6 },
    { x: -4, y: 1.6, z: -7 },
    { x: -3, y: 1.6, z: -8 }
  ];

  const rig = document.querySelector('[camera]').parentElement;

  function moveRig(pos) {
    rig.setAttribute('animation', {
      property: 'position',
      to: `${pos.x} ${pos.y} ${pos.z}`,
      dur: 800,
      easing: 'easeInOutQuad'
    });
  }

  // ENTER PLANE MODE
  btn4.addEventListener('click', () => {

    inPlaneMode = true;
    step = 0;

    sky.setAttribute('visible', false);
    planeSky.setAttribute('visible', true);
    plane.setAttribute('visible', true);
    ui.setAttribute('visible', false);

    nextBtn.setAttribute('visible', true);

    moveRig(steps[0]);
  });

  // NEXT STEP
  nextBtn.addEventListener('click', () => {

    if (!inPlaneMode) return;

    step++;

    if (step < steps.length) {
      moveRig(steps[step]);
    } else {
      nextBtn.setAttribute('visible', false);
    }

  });

  // 360 BUTTONS
  document.querySelectorAll('.link').forEach(el => {
    el.addEventListener('click', () => {

      if (el.id === 'b1') sky.setAttribute('src', '#howls');
      if (el.id === 'b2') sky.setAttribute('src', '#cottage');
      if (el.id === 'b3') sky.setAttribute('src', '#roof');

    });
  });

});
</script>

</body>
</html>
