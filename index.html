<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>360 + Plane VR - Centered Fix</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

<a-assets>
    <img id="howls" src="Pictures/howls.png">
    <img id="cottage" src="Pictures/cottage.png">
    <img id="roof" src="Pictures/roof.png">

    <img id="btn1Img" src="Pictures/Button1.png">
    <img id="btn2Img" src="Pictures/Button2.png">
    <img id="btn3Img" src="Pictures/Button3.png">
    <img id="btn4Img" src="Pictures/Button4.png">
    <img id="btn5Img" src="Pictures/Button5.png">

    <img id="groundTex" src="Pictures/ground.png">
    <img id="skyPlaneImg" src="Pictures/Sky1.png">
    <img id="sky2Img" src="Pictures/Sky2.jpg">

    <a-asset-item id="planeModel" src="Pictures/plane.glb"></a-asset-item>
</a-assets>

<a-sky id="sky" src="#howls" material="opacity: 1; transparent: true"></a-sky>
<a-sky id="planeSky" src="#skyPlaneImg" visible="false" material="opacity: 1; transparent: true"></a-sky>
<a-sky id="planeSky2" src="#sky2Img" visible="false" material="opacity: 0; transparent: true"></a-sky>

<a-plane id="ground"
    rotation="-90 0 0"
    width="200"
    height="200"
    position="0 -20 0"
    material="src:#groundTex; repeat:100 100; shader:standard; roughness:1; metalness:0"
    visible="false">
</a-plane>

<a-entity id="plane"
    gltf-model="#planeModel"
    position="0 0 0"
    scale="2 2 2"
    visible="false">
</a-entity>

<a-entity id="ui" visible="false">
    <a-box class="link" id="b1" position="-2.25 0 0" depth="0.1" height="1" width="1" material="src:#btn1Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>
    <a-box class="link" id="b2" position="-0.75 0 0" depth="0.1" height="1" width="1" material="src:#btn2Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>
    <a-box class="link" id="b3" position="0.75 0 0" depth="0.1" height="1" width="1" material="src:#btn3Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>
    <a-box class="link" id="planeBtn" position="2.25 0 0" depth="0.1" height="1" width="1" material="src:#btn4Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>
</a-entity>

<a-entity id="rig">
  <a-entity camera look-controls id="main-cam">
    <a-cursor
        raycaster="objects: .link"
        material="color:white; shader:flat; depthTest:false"
    ></a-cursor>
  </a-entity>
</a-entity>

<a-entity id="nextBtn"
    class="link"
    geometry="primitive:plane; height:0.35; width:0.7"
    material="src:#btn5Img; transparent:true; depthTest:false"
    visible="false">
</a-entity>

</a-scene>

<script>
window.addEventListener('DOMContentLoaded', () => {

    const scene = document.querySelector('a-scene');
    const sky = document.querySelector('#sky');
    const planeSky = document.querySelector('#planeSky');
    const planeSky2 = document.querySelector('#planeSky2');
    const ground = document.querySelector('#ground');
    const plane = document.querySelector('#plane');
    const ui = document.querySelector('#ui');
    const planeBtn = document.querySelector('#planeBtn');
    const nextBtn = document.querySelector('#nextBtn');
    const rig = document.querySelector('#rig');

    let inPlaneMode = false;
    let step = 0;
    let planeLoaded = false;
    let takeoff = false;
    let groundSpeed = 0.08;

    const steps = [
        { x: 50, y: 3, z: 40, rotY: 0, btnAngle: 220 },
        { x: 0, y: 0.4, z: 27, rotY: -90, btnAngle: 150 },
        { x: 0, y: 0.4, z: 9.4, rotY: -90, btnAngle: 50 },
        { x: 3, y: -0.3, z: 9.4, rotY: -90, btnAngle: 0 },
    ];

    // ================= INITIALIZATION =================
    scene.addEventListener('loaded', () => {
        if (!scene.is('vr-mode')) {
            rig.object3D.position.y = 1.6;
        }
        // Give the camera a moment to settle before spawning UI
        setTimeout(spawnButtons, 600);
    });

    plane.addEventListener('model-loaded', () => {
        planeLoaded = true;
    });

    // ================= UI PLACEMENT (CLEAN FORWARD) =================
    function spawnButtons() {
        const rigPos = new THREE.Vector3();
        rig.object3D.getWorldPosition(rigPos);

        // Get the direction the user is actually looking
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyQuaternion(document.querySelector('#main-cam').object3D.quaternion);
        direction.y = 0; // Keep the menu level
        direction.normalize();

        const radius = 4.5; 
        const heightOffset = 0.5;

        // Position the UI container exactly in front of the gaze
        let x = rigPos.x + direction.x * radius;
        let z = rigPos.z + direction.z * radius;
        let y = rigPos.y + heightOffset;

        ui.setAttribute('position', `${x} ${y} ${z}`);
        
        // Make the UI face the player
        ui.object3D.lookAt(rigPos.x, y, rigPos.z);
        ui.setAttribute('visible', true);
    }

    // ================= SKY LOGIC (GRADUAL TRANSITION) =================
    function setSky(type) {
        if (type === 'normal') {
            sky.setAttribute('visible', true);
            planeSky.setAttribute('visible', false);
            planeSky2.setAttribute('visible', false);
        }
        if (type === 'plane') {
            sky.setAttribute('visible', false);
            planeSky.setAttribute('visible', true);
            planeSky2.setAttribute('visible', false);
            planeSky2.setAttribute('material', 'opacity', 0); // Reset for next time
        }
        if (type === 'plane2') {
            planeSky2.setAttribute('visible', true);
            planeSky2.setAttribute('animation', {
                property: 'components.material.material.opacity',
                from: 0,
                to: 1,
                dur: 4000,
                easing: 'linear'
            });
        }
    }

    // ================= PLANE MODE CONTROLS =================
    planeBtn.addEventListener('click', () => {
        resetPlaneMode();
        enterPlaneMode();
    });

    function enterPlaneMode() {
        inPlaneMode = true;
        step = 0;
        takeoff = false;
        setSky('plane');
        ui.setAttribute('visible', false);
        ground.setAttribute('visible', true);
        nextBtn.setAttribute('visible', true);

        const start = () => {
            plane.setAttribute('visible', true);
            moveRig(steps[0]);
            setTimeout(() => placeNextButton(0), 850);
        };

        if (!planeLoaded) {
            plane.addEventListener('model-loaded', start, { once: true });
        } else {
            start();
        }
    }

    function startTakeoff() {
        takeoff = true;
        // Ground starts moving away
        setTimeout(() => {
            ground.setAttribute('animation__drop', {
                property: 'position',
                to: `0 -120 -400`,
                dur: 12000,
                easing: 'linear'
            });
        }, 3000);

        // Gradual Sky Fade
        setTimeout(() => setSky('plane2'), 7000);

        // End of sequence - Return to Menu
        setTimeout(() => {
            ground.setAttribute('visible', false);
            // PLANE STAYS VISIBLE NOW
            spawnButtons();
            inPlaneMode = false;
        }, 15000);
    }

    // ================= HELPERS =================
    function moveRig(pos) {
        const h = scene.is('vr-mode') ? 0 : 1.2;
        rig.setAttribute('animation__pos', { property: 'position', to: `${pos.x} ${pos.y + h} ${pos.z}`, dur: 800 });
        rig.setAttribute('animation__rot', { property: 'rotation', to: `0 ${pos.rotY} 0`, dur: 800 });
    }

    function placeNextButton(stepIndex) {
        const rigPos = new THREE.Vector3();
        rig.object3D.getWorldPosition(rigPos);
        const baseRot = THREE.MathUtils.degToRad(rig.object3D.rotation.y);
        const angle = baseRot + THREE.MathUtils.degToRad(steps[stepIndex].btnAngle);
        const radius = 2.8;
        nextBtn.setAttribute('position', `${rigPos.x + Math.sin(angle) * radius} ${rigPos.y + 0.2} ${rigPos.z + Math.cos(angle) * radius}`);
        nextBtn.object3D.lookAt(rigPos);
    }

    nextBtn.addEventListener('click', () => {
        if (!inPlaneMode) return;
        step++;
        if (step < steps.length) {
            moveRig(steps[step]);
            setTimeout(() => placeNextButton(step), 850);
        } else {
            nextBtn.setAttribute('visible', false);
            startTakeoff();
        }
    });

    function resetPlaneMode() {
        step = 0; takeoff = false;
        ground.object3D.position.set(0, -20, 0);
        plane.setAttribute('visible', false);
        nextBtn.setAttribute('visible', false);
        setSky('normal');
    }

    function animate() {
        if (takeoff) ground.object3D.position.z -= groundSpeed;
        requestAnimationFrame(animate);
    }
    animate();

    document.querySelectorAll('#b1,#b2,#b3').forEach(el => {
        el.addEventListener('click', () => {
            inPlaneMode = false;
            plane.setAttribute('visible', false);
            ground.setAttribute('visible', false);
            setSky('normal');
            if (el.id === 'b1') sky.setAttribute('src', '#howls');
            if (el.id === 'b2') sky.setAttribute('src', '#cottage');
            if (el.id === 'b3') sky.setAttribute('src', '#roof');
            setTimeout(spawnButtons, 100);
        });
    });
});
</script>
</body>
</html>
