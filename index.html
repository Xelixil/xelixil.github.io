<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Project Showcase</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Assets -->
  <a-assets>
    <!-- 360° panoramas -->
    <img id="howls" src="pictures/howls.png">
    <img id="cottage" src="pictures/cottage.png">
    <img id="roof" src="pictures/roof.png">

    <!-- Buttons -->
    <img id="btn1" src="pictures/Button1.png">
    <img id="btn2" src="pictures/Button2.png">
    <img id="btn3" src="pictures/Button3.png">

    <!-- Sound -->
    <audio id="click-sound"
           src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>
  </a-assets>

  <!-- 360° Scene -->
  <a-sky id="image-360" src="#howls"></a-sky>

  <!-- BUTTONS -->
  <a-entity id="links" position="0 1.5 -3">

    <!-- Button 1 -->
    <a-entity geometry="primitive: plane; height: 1; width: 1"
              material="src: #btn1; shader: flat"
              position="-2 0 0"
              class="link"
              onclick="changeSky('#howls')">
    </a-entity>

    <!-- Button 2 -->
    <a-entity geometry="primitive: plane; height: 1; width: 1"
              material="src: #btn2; shader: flat"
              position="0 0 0"
              class="link"
              onclick="changeSky('#cottage')">
    </a-entity>

    <!-- Button 3 -->
    <a-entity geometry="primitive: plane; height: 1; width: 1"
              material="src: #btn3; shader: flat"
              position="2 0 0"
              class="link"
              onclick="changeSky('#roof')">
    </a-entity>

  </a-entity>

  <!-- CAMERA (FIXED) -->
  <a-entity position="0 1.6 0">
    <a-camera look-controls>
      <a-cursor
        raycaster="objects: .link"
        fuse="false"
        material="color: black">
      </a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<!-- SIMPLE SKY SWITCH SCRIPT -->
<script>
  function changeSky(id) {
    const sky = document.querySelector('#image-360');
    sky.setAttribute('src', id);
  }
</script>

</body>
</html>
