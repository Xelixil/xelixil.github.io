<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Project Showcase</title>

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <img id="howls" src="Pictures/howls.png">
    <img id="cottage" src="Pictures/cottage.png">
    <img id="roof" src="Pictures/roof.png">

    <img id="btn1" src="Pictures/Button1.png">
    <img id="btn2" src="Pictures/Button2.png">
    <img id="btn3" src="Pictures/Button3.png">
    <img id="btn4" src="Pictures/Button4.png">
    <img id="btn5" src="Pictures/Button5.png">

    <a-asset-item id="planeModel" src="Pictures/plane.glb"></a-asset-item>

    <audio id="click-sound" src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>
  </a-assets>

  <!-- SKY (360 MODE) -->
  <a-sky id="sky" src="#howls"></a-sky>

  <!-- SKY (PLANE MODE) -->
  <a-sky id="planeSky"
         visible="false"
         color="#87CEEB">
  </a-sky>

  <!-- PLANE -->
  <a-entity id="plane"
            gltf-model="#planeModel"
            position="-6 -1 -6"
            scale="0.5 0.5 0.5"
            visible="false">
  </a-entity>

  <!-- CAMERA RIG (MOVE THIS) -->
  <a-entity id="rig" position="0 1.6 0">
    <a-camera look-controls>
      <a-cursor raycaster="objects: .clickable"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- BUTTONS -->
  <a-entity id="ui" position="-2 -1 -4">

    <!-- 360 buttons -->
    <a-box class="clickable" id="b1" position="0 0 0" depth="0.1" height="1" width="1"
           material="src: #btn1"></a-box>

    <a-box class="clickable" id="b2" position="1.5 0 0" depth="0.1" height="1" width="1"
           material="src: #btn2"></a-box>

    <a-box class="clickable" id="b3" position="3 0 0" depth="0.1" height="1" width="1"
           material="src: #btn3"></a-box>

    <!-- ENTER PLANE -->
    <a-box class="clickable" id="btn4" position="4.5 0 0" depth="0.1" height="1" width="1"
           material="src: #btn4"></a-box>

    <!-- NEXT -->
    <a-box class="clickable" id="btn5" position="6 0 0" depth="0.1" height="1" width="1"
           material="src: #btn5"
           visible="false"></a-box>

  </a-entity>

</a-scene>

<script>
window.addEventListener('DOMContentLoaded', () => {

  const sky = document.querySelector('#sky');
  const planeSky = document.querySelector('#planeSky');
  const plane = document.querySelector('#plane');

  const ui = document.querySelector('#ui');

  const rig = document.querySelector('#rig');

  const btn4 = document.querySelector('#btn4');
  const btn5 = document.querySelector('#btn5');

  let step = 0;

  const steps = [
    { x: -6, y: 1.6, z: -4 },
    { x: -5, y: 1.6, z: -6 },
    { x: -6, y: 2.0, z: -7 }
  ];

  function moveRig(pos) {
    rig.setAttribute('animation', {
      property: 'position',
      to: pos,
      dur: 800,
      easing: 'easeInOutQuad'
    });
  }

  // CLICK DETECTION (GLOBAL FIX)
  document.querySelectorAll('.clickable').forEach(el => {
    el.addEventListener('click', (e) => {

      const id = el.id;

      // ENTER PLANE MODE
      if (id === 'btn4') {

        sky.setAttribute('visible', false);
        planeSky.setAttribute('visible', true);

        plane.setAttribute('visible', true);
        ui.setAttribute('visible', false);

        btn5.setAttribute('visible', true);

        moveRig(steps[0]);
      }

      // NEXT STEP
      if (id === 'btn5') {

        step++;

        if (step < steps.length) {
          moveRig(steps[step]);
        } else {
          btn5.setAttribute('visible', false);
        }
      }

      // 360 IMAGE SWITCHING
      if (id === 'b1') sky.setAttribute('src', '#howls');
      if (id === 'b2') sky.setAttribute('src', '#cottage');
      if (id === 'b3') sky.setAttribute('src', '#roof');

    });
  });

});
</script>

</body>
</html>
