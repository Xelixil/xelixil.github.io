<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>360 + Plane VR</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

<a-assets>

<img id="howls" src="Pictures/howls.png">
<img id="cottage" src="Pictures/cottage.png">
<img id="roof" src="Pictures/roof.png">

<img id="btn1Img" src="Pictures/Button1.png">
<img id="btn2Img" src="Pictures/Button2.png">
<img id="btn3Img" src="Pictures/Button3.png">
<img id="btn4Img" src="Pictures/Button4.png">
<img id="btn5Img" src="Pictures/Button5.png">

<img id="groundTex" src="Pictures/ground.png">

<img id="skyPlaneImg" src="Pictures/Sky1.png">
<img id="sky2Img" src="Pictures/Sky2.jpg">

<a-asset-item id="planeModel" src="Pictures/plane.glb"></a-asset-item>

</a-assets>


<!-- SKY -->
<a-sky id="sky" src="#howls"></a-sky>

<a-sky id="planeSky" src="#skyPlaneImg" visible="false"></a-sky>
<a-sky id="planeSky2" src="#sky2Img" visible="false"></a-sky>


<!-- GROUND -->
<a-plane id="ground"
rotation="-90 0 0"
width="200"
height="200"
position="0 -20 0"
material="src:#groundTex; repeat:100 100; shader:standard; roughness:1; metalness:0"
visible="false">
</a-plane>


<!-- PLANE -->
<a-entity id="plane"
gltf-model="#planeModel"
position="0 0 0"
scale="2 2 2"
visible="false">
</a-entity>


<!-- UI -->
<a-entity id="ui">

<a-box class="link" id="b1"
depth="0.1" height="1" width="1"
material="src:#btn1Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>

<a-box class="link" id="b2"
position="1.5 0 0"
depth="0.1" height="1" width="1"
material="src:#btn2Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>

<a-box class="link" id="b3"
position="3 0 0"
depth="0.1" height="1" width="1"
material="src:#btn3Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>

<a-box class="link" id="planeBtn"
position="4.5 0 0"
depth="0.1" height="1" width="1"
material="src:#btn4Img; transparent:true; depthTest:false; alphaTest:0.1"></a-box>

</a-entity>


<!-- CAMERA -->
<a-entity id="rig">
  <a-entity camera look-controls>
    <a-cursor
    raycaster="objects: .link"
    material="color:white; shader:flat; depthTest:false"
    ></a-cursor>
  </a-entity>
</a-entity>


<!-- NEXT BUTTON -->
<a-entity id="nextBtn"
class="link"
geometry="primitive:plane; height:0.35; width:0.7"
material="src:#btn5Img; transparent:true; depthTest:false"
visible="false">
</a-entity>

</a-scene>


<script>

window.addEventListener('DOMContentLoaded', () => {

const scene = document.querySelector('a-scene');

const sky = document.querySelector('#sky');
const planeSky = document.querySelector('#planeSky');
const planeSky2 = document.querySelector('#planeSky2');

const ground = document.querySelector('#ground');
const plane = document.querySelector('#plane');
const ui = document.querySelector('#ui');

const planeBtn = document.querySelector('#planeBtn');
const nextBtn = document.querySelector('#nextBtn');
const rig = document.querySelector('#rig');

let inPlaneMode = false;
let step = 0;
let planeLoaded = false;
let takeoff = false;
let groundSpeed = 0.08;


// ================= HEIGHT SYSTEM =================
function getDesktopHeight(){
  return scene.is('vr-mode') ? 0 : 1.2;
}

scene.addEventListener('loaded', () => {
  if(!scene.is('vr-mode')){
    rig.object3D.position.y = 1.6;
  }
});


// ================= PLANE LOAD =================
plane.addEventListener('model-loaded', () => {
  planeLoaded = true;
});


// ================= STEPS =================
const steps = [
{ x: 50, y: 3, z: 40, rotY: 0, btnAngle: 220 },
{ x: 0, y: 0.4, z: 27, rotY: -90, btnAngle: 150 },
{ x: 0, y: 0.4, z: 9.4, rotY: -90, btnAngle: 50 },
{ x: 3, y: -0.3, z: 9.4, rotY: -90, btnAngle: 0 },
];


// ================= MOVE RIG =================
function moveRig(pos){
const h = getDesktopHeight();

rig.setAttribute('animation__pos',{
  property:'position',
  to:`${pos.x} ${pos.y + h} ${pos.z}`,
  dur:800,
  easing:'easeInOutQuad'
});

rig.setAttribute('animation__rot',{
  property:'rotation',
  to:`0 ${pos.rotY} 0`,
  dur:800,
  easing:'easeInOutQuad'
});
}


// ================= FORCE UI ABOVE EVERYTHING =================
function forceUIRenderOrder(el){
  el.object3D.renderOrder = 9999;
}


// ================= NEXT BUTTON =================
function placeNextButton(stepIndex){

const cam = document.querySelector('[camera]').object3D;

const pos = new THREE.Vector3();
cam.getWorldPosition(pos);

const baseRot = THREE.MathUtils.degToRad(rig.object3D.rotation.y);
const offset = THREE.MathUtils.degToRad(steps[stepIndex].btnAngle);

const angle = baseRot + offset;

const radius = 2.8;

// higher + forward + slight right
const x = pos.x + Math.sin(angle) * radius + 0.3;
const z = pos.z + Math.cos(angle) * radius;
const y = pos.y - 0.1;

nextBtn.setAttribute('position', `${x} ${y} ${z}`);

nextBtn.object3D.lookAt(new THREE.Vector3(pos.x, y, pos.z));

forceUIRenderOrder(nextBtn);
}


// ================= ENTER PLANE =================
planeBtn.addEventListener('click', () => {
resetPlaneMode();
enterPlaneMode();
});

function enterPlaneMode(){

inPlaneMode = true;
step = 0;
takeoff = false;

// FORCE CLEAN SKY STATE
sky.setAttribute('visible', false);
planeSky2.setAttribute('visible', false);

planeSky.setAttribute('material','opacity:1');
planeSky.setAttribute('visible', true);

ui.setAttribute('visible',false);
ground.setAttribute('visible',true);
nextBtn.setAttribute('visible',true);

function wait(){
if(!planeLoaded) return requestAnimationFrame(wait);

plane.setAttribute('visible',true);

moveRig(steps[0]);
setTimeout(() => placeNextButton(0), 850);
}

wait();
}


// ================= RESET =================
function resetPlaneMode(){

step = 0;
takeoff = false;

ground.object3D.position.set(0,-7,0);

planeSky.setAttribute('visible',false);
planeSky2.setAttribute('visible',false);

ground.setAttribute('visible',false);
plane.setAttribute('visible',false);

nextBtn.setAttribute('visible',false);
}


// ================= EXIT PLANE =================
function exitPlaneMode(){

inPlaneMode = false;

planeSky.setAttribute('visible', false);
planeSky2.setAttribute('visible', false);
sky.setAttribute('visible', true);

ground.setAttribute('visible', false);
plane.setAttribute('visible', false);

nextBtn.setAttribute('visible', false);

spawnButtons();
}


// ================= NEXT =================
nextBtn.addEventListener('click', () => {

if(!inPlaneMode) return;

step++;

if(step < steps.length){
  moveRig(steps[step]);
  setTimeout(() => placeNextButton(step), 850);
}else{
  nextBtn.setAttribute('visible',false);
  startTakeoff();
}

});


// ================= TAKEOFF =================
function startTakeoff(){

takeoff = true;

setTimeout(()=>{
ground.setAttribute('animation__drop',{
property:'position',
to:`0 -120 -400`,
dur:12000,
easing:'linear'
});
},3000);

setTimeout(()=>{

// fade OUT sky1
planeSky.setAttribute('animation__fadeout',{
property:'material.opacity',
to:0,
dur:2000
});

// ONLY after fade begins → show sky2
setTimeout(()=>{
planeSky2.setAttribute('visible', true);
planeSky2.setAttribute('material','opacity:1');
}, 2000);

},7000);

setTimeout(()=>{
ground.setAttribute('visible',false);
planeSky.setAttribute('visible',false);
spawnButtons();
inPlaneMode = false;
},15000);
}

function getPlayerPosition(){
  const cam = document.querySelector('[camera]').object3D;
  const rigPos = new THREE.Vector3();
  rig.object3D.getWorldPosition(rigPos);

  const camPos = new THREE.Vector3();
  const pos = getPlayerPosition();

  // fallback height safety (fixes floor spawning bug)
  const y = Math.max(camPos.y, rigPos.y, 1.6);

  return new THREE.Vector3(camPos.x, y, camPos.z);
}

// ================= UI SPAWN (FIXED + CLEAN) =================
function spawnButtons(){

const pos = getPlayerPosition();

const baseRot = rig.object3D.rotation.y;

// CONFIG
const radius = 3.2;
const forwardOffset = 2.2;   // increased so it never clips plane
const sideOffset = 0.4;      // reduced so it doesn't drift left
const heightOffset = 0.6;    // FIX: keeps buttons above ground ALWAYS

const forward = new THREE.Vector3(
  Math.sin(baseRot),
  0,
  Math.cos(baseRot)
);

const right = new THREE.Vector3(
  Math.cos(baseRot),
  0,
  -Math.sin(baseRot)
);

let x = pos.x + forward.x * radius;
let z = pos.z + forward.z * radius;

// push forward (important fix for “behind plane” issue)
x += forward.x * forwardOffset;
z += forward.z * forwardOffset;

// reduce sideways drift
x += right.x * sideOffset;
z += right.z * sideOffset;

// FIX HEIGHT (this is what fixes floor clipping)
let y = pos.y + heightOffset;

ui.setAttribute('position', `${x} ${y} ${z}`);

ui.object3D.lookAt(new THREE.Vector3(pos.x, y, pos.z));

ui.object3D.renderOrder = 9999;

ui.setAttribute('visible', true);
}


// ================= GROUND ANIMATION =================
function animateGround(){
if(takeoff){
ground.object3D.position.z -= groundSpeed;
}
requestAnimationFrame(animateGround);
}
animateGround();


// ================= SKY BUTTONS =================
document.querySelectorAll('#b1,#b2,#b3').forEach(el=>{
el.addEventListener('click',()=>{

exitPlaneMode();

if(el.id==='b1') sky.setAttribute('src','#howls');
if(el.id==='b2') sky.setAttribute('src','#cottage');
if(el.id==='b3') sky.setAttribute('src','#roof');

});
});

});

</script>
</body>
</html>
