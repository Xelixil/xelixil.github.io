<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 + Plane VR</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- ASSETS -->
  <a-assets>
    <img id="howls" src="Pictures/howls.png">
    <img id="cottage" src="Pictures/cottage.png">
    <img id="roof" src="Pictures/roof.png">

    <img id="btn1" src="Pictures/Button1.png">
    <img id="btn2" src="Pictures/Button2.png">
    <img id="btn3" src="Pictures/Button3.png">
    <img id="btn4" src="Pictures/Button4.png">
    <img id="btn5" src="Pictures/Button5.png">

    <a-asset-item id="planeModel" src="Pictures/plane.glb"></a-asset-item>

    <audio id="click-sound"
           src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>
  </a-assets>

  <!-- SKY -->
  <a-sky id="sky" src="#howls"></a-sky>

  <a-sky id="planeSky" visible="false" color="#87CEEB"></a-sky>

  <!-- PLANE -->
  <a-entity id="plane"
            gltf-model="#planeModel"
            position="-6 -1 -6"
            scale="0.5 0.5 0.5"
            visible="false">
  </a-entity>

  <!-- UI WORLD (360 BUTTONS) -->
  <a-entity id="ui" position="-2 -1 -4">

    <a-box class="clickable" id="b1" position="0 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn1"></a-box>

    <a-box class="clickable" id="b2" position="1.5 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn2"></a-box>

    <a-box class="clickable" id="b3" position="3 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn3"></a-box>

    <a-box class="clickable" id="btn4" position="4.5 0 0"
           depth="0.1" height="1" width="1"
           material="src: #btn4"></a-box>

  </a-entity>

  <!-- CAMERA RIG (THIS MOVES) -->
  <a-entity id="rig" position="0 1.6 0">

    <a-camera look-controls>

      <!-- NEXT BUTTON ATTACHED TO CAMERA -->
      <a-entity id="nextBtn"
                class="clickable"
                position="0 -0.3 -1"
                geometry="primitive: plane; height: 0.3; width: 0.6"
                material="src: #btn5">
      </a-entity>

      <a-cursor raycaster="objects: .clickable"></a-cursor>

    </a-camera>

  </a-entity>

</a-scene>

<script>
window.addEventListener('DOMContentLoaded', () => {

  const sky = document.querySelector('#sky');
  const planeSky = document.querySelector('#planeSky');
  const plane = document.querySelector('#plane');
  const ui = document.querySelector('#ui');
  const rig = document.querySelector('#rig');

  const btn4 = document.querySelector('#btn4');
  const nextBtn = document.querySelector('#nextBtn');

  let inPlaneMode = false;
  let step = 0;

  // 📍 CAMERA POSITIONS (EDIT THESE!)
  const steps = [
    { x: -6, y: 1.6, z: -4 }, // STEP 1: entry (when entering plane mode)
    { x: -5, y: 1.6, z: -6 }, // STEP 2: aisle
    { x: -4, y: 1.6, z: -7 }, // STEP 3: seat area
    { x: -3, y: 1.6, z: -8 }  // STEP 4: final seat / window
  ];

  function moveRig(pos) {
    rig.setAttribute('animation', {
      property: 'position',
      to: `${pos.x} ${pos.y} ${pos.z}`,
      dur: 800,
      easing: 'easeInOutQuad'
    });
  }

  // ENTER PLANE MODE
  btn4.addEventListener('click', () => {

    inPlaneMode = true;
    step = 0;

    sky.setAttribute('visible', false);
    planeSky.setAttribute('visible', true);
    plane.setAttribute('visible', true);
    ui.setAttribute('visible', false);

    nextBtn.setAttribute('visible', true);

    moveRig(steps[0]);
  });

  // NEXT BUTTON LOGIC
  nextBtn.addEventListener('click', () => {

    if (!inPlaneMode) return;

    step++;

    if (step < steps.length) {
      moveRig(steps[step]);
    }
    else {
      // End of sequence
      nextBtn.setAttribute('visible', false);
    }

  });

});
</script>

</body>
</html>
