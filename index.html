<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Project Showcase</title>
  <meta name="description" content="360° Image Gallery - A-Frame">

  <!-- A-Frame Core -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <!-- Components -->
  <script src="https://unpkg.com/aframe-template-component@3.x.x/dist/aframe-template-component.min.js"></script>
  <script src="https://unpkg.com/aframe-layout-component@4.x.x/dist/aframe-layout-component.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-proxy-event-component@2.1.0/dist/aframe-proxy-event-component.min.js"></script>

  

  <!-- Template for clickable image links -->
  <script id="link" type="text/html">
    <a-entity
      class="link"
      geometry="primitive: plane; height: 1; width: 1"
      material="shader: flat; src: ${thumb}"
      sound="on: click; src: #click-sound"
      event-set__mouseenter="scale: 1.2 1.2 1"
      event-set__mouseleave="scale: 1 1 1"
      event-set__click="_target: #image-360; _delay: 300; material.src: ${src}"
      proxy-event="event: click; to: #image-360; as: fade">
    </a-entity>
  </script>
</head>

<body>
  <a-scene>

    <!-- Assets -->
    <a-assets>
      <!-- Panorama images -->
      <img id="howls" src="Pictures/howls.png">
      <img id="cottage" src="Pictures/cottage.png">
      <img id="roof" src="Pictures/roof.png">

      <!-- Button thumbnails -->
      <img id="btn1" src="Pictures/Button1.png">
      <img id="btn2" src="Pictures/Button2.png">
      <img id="btn3" src="Pictures/Button3.png">
      <img id="btn4" src="Pictures/Button4.png">

      <!-- Click sound -->
      <audio id="click-sound"
             src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>
    </a-assets>

    <!-- 360° Gallery Sky -->
    <a-sky
      id="image-360"
      radius="10"
      src="#howls"
      animation__fade="property: components.material.material.color;
                       type: color;
                       from: #FFF;
                       to: #000;
                       dur: 300;
                       startEvents: fade"
      animation__fadeback="property: components.material.material.color;
                           type: color;
                           from: #000;
                           to: #FFF;
                           dur: 300;
                           startEvents: animationcomplete__fade">
    </a-sky>

    <!-- Airplane Scene Sky (hidden at start) -->
    <a-sky id="plane-sky"
       visible="false"
       radius="10"
       color="#87CEEB">
</a-sky>

    <!-- Image Buttons -->
    <a-entity id="links"
              layout="type: line; margin: 1.5"
              position="-2.25 -1 -4">

      <a-entity template="src: #link"
                data-src="#howls"
                data-thumb="#btn1"></a-entity>

      <a-entity template="src: #link"
                data-src="#cottage"
                data-thumb="#btn2"></a-entity>

      <a-entity template="src: #link"
                data-src="#roof"
                data-thumb="#btn3"></a-entity>

      <!-- Button 4 (Custom Behavior) -->
      <a-entity id="btn4-entity"
                class="link"
                geometry="primitive: plane; height: 1; width: 1"
                material="shader: flat; src: #btn4"
                sound="on: click; src: #click-sound"
                event-set__mouseenter="scale: 1.2 1.2 1"
                event-set__mouseleave="scale: 1 1 1">
      </a-entity>

    </a-entity>

    <!-- Camera -->
    <a-entity camera look-controls>
      <a-cursor
        id="cursor"
        raycaster="objects: .link"
        animation__click="property: scale;
                          startEvents: click;
                          from: 0.1 0.1 0.1;
                          to: 1 1 1;
                          dur: 150"
        animation__fusing="property: scale;
                           startEvents: fusing;
                           from: 1 1 1;
                           to: 0.1 0.1 0.1;
                           dur: 1500"
        event-set__mouseenter="_event: mouseenter; color: springgreen"
        event-set__mouseleave="_event: mouseleave; color: black">
      </a-cursor>
    </a-entity>

  </a-scene>

  <!-- Script -->
  <script>
    const btn4 = document.querySelector('#btn4-entity');
    const sky360 = document.querySelector('#image-360');
    const planeSky = document.querySelector('#plane-sky');

    btn4.addEventListener('click', () => {
      // Hide gallery
      sky360.setAttribute('visible', false);

      // Show airplane scene
      planeSky.setAttribute('visible', true);
    });
  </script>

</body>
</html>
