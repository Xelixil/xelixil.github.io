<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Project Showcase</title>

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <script src="https://unpkg.com/aframe-template-component@3.x.x/dist/aframe-template-component.min.js"></script>
  <script src="https://unpkg.com/aframe-layout-component@4.x.x/dist/aframe-layout-component.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
  <script src="https://unpkg.com/aframe-proxy-event-component@2.1.0/dist/aframe-proxy-event-component.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- Assets -->
    <a-assets timeout="10000">

      <img id="howls" src="Pictures/howls.png">
      <img id="cottage" src="Pictures/cottage.png">
      <img id="roof" src="Pictures/roof.png">

      <img id="btn1" src="Pictures/Button1.png">
      <img id="btn2" src="Pictures/Button2.png">
      <img id="btn3" src="Pictures/Button3.png">
      <img id="btn4" src="Pictures/Button4.png">
      <img id="btn5" src="Pictures/Button5.png">

      <a-asset-item id="planeModel" src="Pictures/plane.glb"></a-asset-item>

      <audio id="click-sound"
             src="https://cdn.aframe.io/360-image-gallery-boilerplate/audio/click.ogg"></audio>
    </a-assets>

    <!-- SKY -->
    <a-sky id="image-360" radius="10" src="#howls"></a-sky>

    <a-sky id="plane-sky"
           visible="false"
           radius="30"
           color="#87CEEB">
    </a-sky>

    <!-- CAMERA RIG (WE MOVE THIS) -->
    <a-entity id="rig" position="0 1.6 0">

      <a-entity camera look-controls>
        <a-cursor raycaster="objects: .link"></a-cursor>
      </a-entity>

    </a-entity>

    <!-- PLANE -->
    <a-entity id="plane"
              gltf-model="#planeModel"
              position="-6 -1 -6"
              scale="0.5 0.5 0.5"
              visible="false">
    </a-entity>

    <!-- BUTTONS -->
    <a-entity id="links"
              layout="type: line; margin: 1.5"
              position="-2.25 -1 -4">

      <a-entity class="link"
                geometry="primitive: plane; height: 1; width: 1"
                material="shader: flat; src: #btn1"
                sound="on: click; src: #click-sound"></a-entity>

      <a-entity class="link"
                geometry="primitive: plane; height: 1; width: 1"
                material="shader: flat; src: #btn2"
                sound="on: click; src: #click-sound"></a-entity>

      <a-entity class="link"
                geometry="primitive: plane; height: 1; width: 1"
                material="shader: flat; src: #btn3"
                sound="on: click; src: #click-sound"></a-entity>

      <!-- Button 4 (ENTER PLANE MODE) -->
      <a-entity id="btn4"
                class="link"
                geometry="primitive: plane; height: 1; width: 1"
                material="shader: flat; src: #btn4"
                sound="on: click; src: #click-sound">
      </a-entity>

      <!-- Button 5 (NEXT STEP) -->
      <a-entity id="btn5"
                class="link"
                geometry="primitive: plane; height: 1; width: 1"
                material="shader: flat; src: #btn5"
                visible="false"
                sound="on: click; src: #click-sound">
      </a-entity>

    </a-entity>

    <!-- SCRIPT -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {

        const rig = document.querySelector('#rig');
        const plane = document.querySelector('#plane');
        const sky = document.querySelector('#image-360');
        const planeSky = document.querySelector('#plane-sky');

        const links = document.querySelector('#links');
        const btn4 = document.querySelector('#btn4');
        const btn5 = document.querySelector('#btn5');

        let step = 0;

        const steps = [
          { x: -6, y: 1.6, z: -4 }, // entrance
          { x: -5, y: 1.6, z: -6 }, // seat
          { x: -6, y: 2.0, z: -7 }  // final
        ];

        function moveRig(pos) {
          rig.setAttribute('animation', {
            property: 'position',
            to: pos,
            dur: 800,
            easing: 'easeInOutQuad'
          });
        }

        // ENTER PLANE MODE
        btn4.addEventListener('click', () => {

          sky.setAttribute('visible', false);
          links.setAttribute('visible', false);

          planeSky.setAttribute('visible', true);
          plane.setAttribute('visible', true);

          btn5.setAttribute('visible', true);

          moveRig(steps[0]);
        });

        // NEXT BUTTON
        btn5.addEventListener('click', () => {

          step++;

          if (step < steps.length) {
            moveRig(steps[step]);
          } else {
            btn5.setAttribute('visible', false);
          }

        });

      });
    </script>

  </a-scene>
</body>
</html>
